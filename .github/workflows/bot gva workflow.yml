name: GVA bot scraper
on:
  workflow_dispatch:
  schedule:
    # Cada 10 min, 06–15 UTC, dilluns–divendres (cobreix 8–17 h Madrid).
    - cron: "*/10 6-15 * * 1-5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Guard: si fora horari Madrid (08–16), saltar.
      - name: Check window
        id: window
        run: |
          export TZ="Europe/Madrid"
          hour=$(date +%H); wday=$(date +%u)
          if [ "$wday" -ge 6 ] || [ "$hour" -lt 8 ] || [ "$hour" -ge 16 ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "🕒 Manual run — execució."
              echo "skip=false" >> "$GITHUB_OUTPUT"
            else
              echo "🕒 Fora finestra L–V 8–16 Madrid (h=$hour, wd=$wday). Skip."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot
        if: steps.window.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIREBASECORE: ${{ secrets.FIREBASECORE }}
        run: python bot_gva.py
